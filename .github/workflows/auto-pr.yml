name: Auto PR from PR branches

on:
  push:
    branches:
      - 'PR/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if PR already exists
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr list \
            --head "${{ github.ref_name }}" \
            --base main \
            --json url \
            --jq '.[0].url' 2>/dev/null || echo "")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check_pr.outputs.pr_url == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          # ตัด PR/ prefix ออกเพื่อใช้เป็น title
          FEATURE_NAME="${BRANCH#PR/}"
          
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "[$FEATURE_NAME] ${{ github.event.head_commit.message }}" \
            --body "## Summary
          Auto-generated PR from branch \`$BRANCH\`

          **Feature:** \`$FEATURE_NAME\`
          **Commit:** ${{ github.sha }}
          **Author:** ${{ github.actor }}

          ---
          > Merge this PR after review and testing."

      - name: Notify Discord (PR Created)
        if: steps.check_pr.outputs.pr_url == ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          FEATURE_NAME="${BRANCH#PR/}"
          PR_URL=$(gh pr list --head "$BRANCH" --json url --jq '.[0].url')
          
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚀 Auto PR Created\",
                \"description\": \"**[$FEATURE_NAME]($PR_URL)**\",
                \"color\": 3447003,
                \"fields\": [
                  { \"name\": \"Branch\", \"value\": \"\`$BRANCH\`\", \"inline\": true },
                  { \"name\": \"Author\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                  { \"name\": \"Commit\", \"value\": \"[\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"${{ github.repository }}\" },
                \"timestamp\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"
              }]
            }" \
            "$DISCORD_WEBHOOK"

      - name: PR already exists
        if: steps.check_pr.outputs.pr_url != ''
        run: |
          echo "PR already exists: ${{ steps.check_pr.outputs.pr_url }}"