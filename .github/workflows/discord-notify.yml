name: Discord Notifications

on:
  pull_request_target:
    types: [opened, reopened, closed]
    branches:
      - main
  push:
    branches:
      - main

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Notify — Push to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚩 New Push to main\",
                \"description\": \"**[${{ github.event.head_commit.message }}](${{ github.event.head_commit.url }})**\",
                \"color\": 10181046,
                \"fields\": [
                  { \"name\": \"Author\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                  { \"name\": \"Commit\", \"value\": \"[\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"${{ github.repository }}\" },
                \"timestamp\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"
              }]
            }" \
            "$DISCORD_WEBHOOK"

      - name: Notify — PR opened / reopened
        if: github.event.action == 'opened' || github.event.action == 'reopened'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          FEATURE="${BRANCH#PR/}"
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔔 Pull Request Opened\",
                \"description\": \"**[${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})**\",
                \"color\": 3447003,
                \"fields\": [
                  { \"name\": \"Feature\", \"value\": \"\`$FEATURE\`\", \"inline\": true },
                  { \"name\": \"Author\", \"value\": \"${{ github.event.pull_request.user.login }}\", \"inline\": true },
                  { \"name\": \"Branch\", \"value\": \"\`${{ github.event.pull_request.head.ref }}\` → \`main\`\", \"inline\": false },
                  { \"name\": \"PR #\", \"value\": \"#${{ github.event.pull_request.number }}\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"${{ github.repository }}\" },
                \"timestamp\": \"${{ github.event.pull_request.created_at }}\"
              }]
            }" \
            "$DISCORD_WEBHOOK"

      - name: Notify — PR merged
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          FEATURE="${BRANCH#PR/}"
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Pull Request Merged\",
                \"description\": \"**[${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})**\",
                \"color\": 5763719,
                \"fields\": [
                  { \"name\": \"Feature\", \"value\": \"\`$FEATURE\`\", \"inline\": true },
                  { \"name\": \"Merged by\", \"value\": \"${{ github.event.pull_request.merged_by.login }}\", \"inline\": true },
                  { \"name\": \"Branch\", \"value\": \"\`${{ github.event.pull_request.head.ref }}\` → \`main\`\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"${{ github.repository }}\" },
                \"timestamp\": \"${{ github.event.pull_request.merged_at }}\"
              }]
            }" \
            "$DISCORD_WEBHOOK"

      - name: Notify — PR closed without merge
        if: github.event.action == 'closed' && github.event.pull_request.merged == false
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          FEATURE="${BRANCH#PR/}"
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ Pull Request Closed\",
                \"description\": \"**[${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})**\",
                \"color\": 15158332,
                \"fields\": [
                  { \"name\": \"Feature\", \"value\": \"\`$FEATURE\`\", \"inline\": true },
                  { \"name\": \"Closed by\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                  { \"name\": \"Branch\", \"value\": \"\`${{ github.event.pull_request.head.ref }}\` → \`main\`\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"${{ github.repository }}\" },
                \"timestamp\": \"${{ github.event.pull_request.closed_at }}\"
              }]
            }" \
            "$DISCORD_WEBHOOK"